services:
  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_pub -h localhost -t health -m ping || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 2s

  data-hub:
    build:
      context: .
      target: data-hub
    command: ["-broker", "tcp://mosquitto:1883", "-client-id", "data-hub"]
    depends_on:
      mosquitto:
        condition: service_healthy
    restart: on-failure

  simulator:
    build:
      context: .
      target: simulator
    command: ["-broker", "tcp://mosquitto:1883", "-client-id", "ros-simulator"]
    depends_on:
      mosquitto:
        condition: service_healthy
    restart: on-failure
